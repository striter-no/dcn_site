<!doctype html>
<html lang="en">
    <head>
        <title>Регистрация домена DCN</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
        <link rel="stylesheet" href="{{ url_for('static', filename='css/main-styles.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/styles-reg.css') }}">
    </head>

    <body>

        <button id="back-button" class="back-btn" onclick="window.history.back()" title="Назад">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" style="width: 24px; height: 24px; fill: #000;">
                <path d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.2 288 416 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-306.7 0L214.6 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z"/>
            </svg>
        </button>

        <div class="container-fluid" id="reg-page">
            <div id="domain-title" class="mono-text big-text">domain.dcn | Регистрация</div>
            <div class="reg-rect continaer main-cont">
                
                <div class="row justify-content-center align-items-center">
                    <div class=" row justify-content-center align-items-center">
                        <div class="col-12 w-75">
                            <div id="rounded-rect" class="row row-no-stretch">
                                <button id="decrease-years-btn" class="col-auto gray-circle text-center" style="border-width: 0;">-</button>
                                <div id="years-display" class="col text-center text-white year-text">1 год</div>
                                <button id="increase-years-btn" class="col-auto pink-circle text-center" style="border-width: 0;">+</button>
                            </div>
                        </div>
                        <div id="registration-text" class="col-12 w-75 text-center pt-3 pb-5 info-text">
                            регистрация на 1 год
                        </div>
                        <div class="col-12 w-70 pt-2" id="money-rect">
                            <div class="row row-no-stretch py-2">
                                <div id="registration-label" class="col" style="color: #9591A4">Регистрация на 1 год</div>
                                <div id="registration-cost" class="col-4 col-lg-3 mono-text" style="color: #9591A4">0 DCN</div>
                            </div>
                            <div class="row row-no-stretch py-2">
                                <div class="col" style="color: #9591A4">Комиссия сети</div>
                                <div id="network-fee" class="col-4 col-lg-3 mono-text" style="color: #9591A4">1 DCN</div>
                            </div>
                            <div class="row row-no-stretch py-2">
                                <div class="col" style="color: #E2E2E2">Итого</div>
                                <div id="total-cost" class="col-4 col-lg-3 mono-text" style="color: #E2E2E2">1 DCN</div>
                            </div>
                        </div>
                        
                    </div>
                </div>
                
                <div class="row justify-content-center align-items-center">
                    <input class="col-12 w-50 text-white text-center mt-5" id="ip-input" placeholder="Введите IP для домена">
                    </input>
                </div>

                <div class="row justify-content-center align-items-center">
                    <button class="col-4  text-white text-center my-5" id="reg-button">
                        Зарегистрировать
                    </button>
                </div>
            </div>
        </div>

        <!-- <div class="container"> -->

                <span style="color: #FFF">striter-no/dcn</span>
